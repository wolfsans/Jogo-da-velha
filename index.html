<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jogo da Velha (Minimax)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Jogo da Velha</h1>
      <p class="sub">Você é <strong>O</strong> • IA é <strong>X</strong> (Minimax imbatível)</p>
    </header>

    <section class="panel">
      <div class="status" id="status">Sua vez!</div>

      <div class="board" id="board" aria-label="Tabuleiro do jogo da velha">
        <button class="cell" data-i="0" aria-label="casa 1"></button>
        <button class="cell" data-i="1" aria-label="casa 2"></button>
        <button class="cell" data-i="2" aria-label="casa 3"></button>
        <button class="cell" data-i="3" aria-label="casa 4"></button>
        <button class="cell" data-i="4" aria-label="casa 5"></button>
        <button class="cell" data-i="5" aria-label="casa 6"></button>
        <button class="cell" data-i="6" aria-label="casa 7"></button>
        <button class="cell" data-i="7" aria-label="casa 8"></button>
        <button class="cell" data-i="8" aria-label="casa 9"></button>
      </div>

      <div class="actions">
        <button id="resetBtn" class="btn">Reiniciar</button>

        <label class="toggle">
          <input type="checkbox" id="aiStarts" />
          <span>IA começa</span>
        </label>

        <label class="toggle">
          <input type="checkbox" id="showHints" />
          <span>Mostrar dica da IA</span>
        </label>
      </div>

      <div class="hint" id="hint" hidden>
        Dica da IA: <span id="hintText"></span>
      </div>
    </section>

    <footer class="footer">
      <small>Feito com HTML/CSS/JS puro • Pronto para GitHub Pages</small>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
